      <section class="py-8 bg-light"><div class="container"><div class="row justify-content-center"><div class="col-lg-8 text-center"><span class="text-uppercase text-primary fw-semibold ls-md">Adhesion en ligne</span><h1 class="display-4 fw-bold mt-3">Soumettre une demande membre CECOB</h1><p class="lead mb-0">Le formulaire suit les champs et le workflow de validation definis dans `todo.md`.</p></div></div></div></section>
      <section class="py-8"><div class="container"><div class="row justify-content-center"><div class="col-lg-10">
        <div class="card"><div class="card-body p-4 p-lg-5">
          <div class="row g-4">
            <div class="col-md-6"><label class="form-label">Nom complet</label><input class="form-control" type="text" placeholder="Nom et prenom" /></div>
            <div class="col-md-6"><label class="form-label">Genre</label><select class="form-select"><option>Selectionner</option><option>Masculin</option><option>Feminin</option></select></div>
            <div class="col-md-6"><label class="form-label">Date de naissance</label><input class="form-control" type="date" /></div>
            <div class="col-md-6"><label class="form-label">Nationalite</label><input class="form-control" type="text" value="Congolaise" /></div>
            <div class="col-md-6"><label class="form-label">Universite</label><input class="form-control" type="text" placeholder="Nom de l’universite" /></div>
            <div class="col-md-6"><label class="form-label">Faculte / Departement</label><input class="form-control" type="text" placeholder="Faculte et departement" /></div>

            <div class="col-md-6"><label class="form-label">Telephone</label><input class="form-control" type="text" placeholder="+257..." /></div>
            <div class="col-md-6"><label class="form-label">Mot de passe</label><input class="form-control" type="password" placeholder="Mot de passe" /></div>
            <div class="col-md-6"><label class="form-label">Photo de profil</label><input class="form-control" type="file" /></div>
